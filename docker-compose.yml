# Build: docker compose ładuje .env (lub skopiuj .env.local → .env przed pierwszym buildem)
# Run: env_file: .env.local – kontener dostaje zmienne z .env.local
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Z .env lub .env.local – potrzebne przy build (NEXT_PUBLIC_* są wbudowywane)
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-https://placeholder.supabase.co}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-placeholder}
        SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-placeholder}
        STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
    restart: unless-stopped
